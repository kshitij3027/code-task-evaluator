services:
  backend:
    build: .
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    volumes:
      - db-data:/app/data
    environment:
      - DATABASE_URL=./data/evaluator.db

  frontend:
    build: ./frontend
    ports:
      - "${FRONTEND_PORT:-5173}:5173"
    volumes:
      - ./frontend/src:/app/src
    depends_on:
      - backend

volumes:
  db-data:
