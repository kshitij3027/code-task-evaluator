stories:
  - name: "User views dashboard, creates a task, verifies it, and submits a solution"
    url: "http://localhost:5173"
    workflow: |
      Navigate to http://localhost:5173/
      Verify the Dashboard page loads with a heading "Dashboard"
      Verify a summary bar shows "Total Tasks", "Total Submissions", and "Overall Pass Rate"
      Verify a table shows at least 3 pre-loaded tasks including "Two Sum", "FizzBuzz", and "Longest Common Subsequence"
      Verify each task row shows a difficulty badge
      Verify the table has an "Actions" column with Edit and Delete buttons
      Select "easy" from the difficulty filter dropdown
      Verify only easy tasks are shown in the table
      Select "All" from the difficulty filter to reset
      Click on "Tasks" in the navigation bar
      Verify the Task List page loads showing task cards with titles and difficulty badges
      Verify each card has Edit and Delete buttons
      Click the "Create Task" link/button
      Verify the Task Creation form loads with title, description, difficulty, and test cases fields
      Verify the reference solution field uses a code editor (not a plain textarea)
      Type "Add Two Numbers" in the title input
      Type "Read two numbers from stdin and print their sum" in the description textarea
      Select "easy" from the difficulty dropdown
      Type "a, b = map(int, input().split())\nprint(a + b)" in the reference solution code editor
      Type "3 4" in the first test case input field
      Type "7" in the first test case expected output field
      Click "Add Test Case"
      Type "0 0" in the second test case input field
      Type "0" in the second test case expected output field
      Click the "Create Task" submit button
      Verify the page redirects to the new task's detail page
      Verify the task title "Add Two Numbers" is displayed
      Verify the test cases are listed showing "3 4" and "7"
      Verify an Edit button, Delete button, and "Verify Reference Solution" button are visible
      Click the "Verify Reference Solution" button
      Verify results appear showing all test cases passed with "Pass" status badges

  - name: "User submits solutions and views results on dashboard"
    url: "http://localhost:5173"
    workflow: |
      Navigate to http://localhost:5173/
      Click on the "Two Sum" task row in the dashboard table
      Verify the Task Detail page loads with the title "Two Sum"
      Verify the test cases are listed with input and expected output
      Verify the solution input uses a code editor component (not a plain textarea)
      Type "a, b = map(int, input().split())\nprint(a + b)" in the code editor
      Click the "Submit Solution (Ctrl+Enter)" button
      Verify a results section appears showing "Passed" and "test cases" text
      Verify test case results show "Pass" status badges
      Clear the code editor
      Type "print('wrong')" in the code editor
      Click the "Submit Solution (Ctrl+Enter)" button
      Verify results show "Wrong Answer" status badges
      Verify the Wrong Answer result shows a diff view comparing expected and actual output
      Navigate to http://localhost:5173/
      Verify the dashboard shows submission counts for "Two Sum"

  - name: "User edits and deletes a task"
    url: "http://localhost:5173"
    workflow: |
      Navigate to http://localhost:5173/tasks
      Verify the Task List page loads
      Click "Create Task"
      Type "Temporary Task" in the title input
      Type "This task will be edited then deleted" in the description textarea
      Select "easy" from the difficulty dropdown
      Type "print(input())" in the reference solution code editor
      Type "hello" in the first test case input field
      Type "hello" in the first test case expected output field
      Click the "Create Task" submit button
      Verify the task detail page shows "Temporary Task"
      Click the "Edit" button
      Verify an edit form appears with pre-populated fields
      Change the title to "Updated Temp Task"
      Click "Save Changes"
      Verify the title updates to "Updated Temp Task"
      Click the "Delete" button
      Verify a confirmation dialog appears asking to confirm deletion
      Click "Confirm Delete"
      Verify the page navigates back to the task list
      Verify "Updated Temp Task" is no longer in the task list
